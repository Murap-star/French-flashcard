": "Je crains que tu n’arrives pas avant notre départ.", "ja": "君が私たちの出発前に着けないのではないかと心配している。"}], "points": ["文語では ne explétif が入ることがある。", "ne だけなら必ずしも否定ではない。pas などがあると実際の否定になる。", "avoir peur que も同様に接続法。"]}, {"lesson": "Leçon 7", "group": "接続法①", "pattern": "Être content que + 接続法", "meaning": "～なのでうれしい", "explanation": "喜びなどの感情を表す表現の後では接続法を使います。", "examples": [{"fr": "Elle est contente que j’aie réussi à l’examen.", "ja": "彼女は私が試験に合格したので喜んでいる。"}, {"fr": "Les Français sont contents que les JO aient lieu à Paris.", "ja": "フランス人はパリでオリンピックが行われることを喜んでいる。"}], "points": ["過去の完了した出来事なら接続法過去：avoir/être の接続法 + 過去分詞。", "avoir lieu は「行われる」という固定表現。", "感情表現：être heureux/triste/surpris que なども接続法。"]}, {"lesson": "Leçon 7", "group": "接続法①", "pattern": "Il est étonnant que + 接続法", "meaning": "～なのは驚きだ", "explanation": "評価・感情を表す非人称表現なので、que 以下は接続法になります。", "examples": [{"fr": "Il est étonnant qu’il pleuve dix jours de suite.", "ja": "10日連続で雨が降るのは驚きだ。"}, {"fr": "Il est étrange qu’elle ne réponde pas.", "ja": "彼女が返事をしないのは不思議だ。"}], "points": ["pleuvoir → qu’il pleuve。", "非人称構文 Il est + 形容詞 + que の多くは接続法。", "確実性を表す Il est certain que は通常直説法。"]}, {"lesson": "Leçon 7", "group": "接続法①", "pattern": "Aimer / J’aimerais que + 接続法", "meaning": "～してほしい・～であってほしい", "explanation": "好み・希望を表します。J’aimerais que は丁寧な希望としてよく使われます。", "examples": [{"fr": "J’aimerais que tout finisse avant midi.", "ja": "お昼前にすべて終わってほしい。"}, {"fr": "J’aimerais que vous soyez à l’heure.", "ja": "時間どおりに来ていただきたいです。"}], "points": ["J’aimerais は条件法で、Je veux より柔らかい。", "finir → finisse、être → soyez。", "主語が同じなら aimer + 不定詞：J’aimerais partir."]}, {"lesson": "Leçon 7", "group": "接続法①", "pattern": "Avoir peur que + 接続法", "meaning": "～ではないかと心配する", "explanation": "不安や恐れを表すため、que 以下は接続法になります。", "examples": [{"fr": "Nous avons peur qu’il ne vienne pas.", "ja": "私たちは彼が来ないのではないかと心配している。"}, {"fr": "J’ai peur qu’elle soit en retard.", "ja": "彼女が遅刻するのではないかと心配だ。"}], "points": ["venir → vienne、être → soit。", "craindre que とほぼ同じ働き。", "実際の否定は ne ...  10", "group": "対立・譲歩・結果", "pattern": "Tellement de + 名詞 + que + 直説法", "meaning": "あまりに多くの～があるので…", "explanation": "数量の程度が原因となって、実際の結果が起きることを表します。", "examples": [{"fr": "Il y a tellement de brouillard que nous ne voyons rien.", "ja": "霧があまりに濃いので、私たちは何も見えない。"}, {"fr": "Il a tellement de livres qu’il n’a pas le temps de tous les lire.", "ja": "彼は本をあまりにたくさん持っているので、全部読む時間がない。"}], "points": ["tellement de の後は名詞。", "結果は事実として述べるため直説法。", "名詞の前に不定冠詞は置かない。"]}, {"lesson": "Leçon 10", "group": "対立・譲歩・結果", "pattern": "Tellement + 形容詞／副詞 + que + 直説法", "meaning": "あまりに～なので…／～すぎて…", "explanation": "性質・状態・程度が原因となって生じる実際の結果を表します。", "examples": [{"fr": "C’est tellement difficile que je ne comprends pas.", "ja": "難しすぎて私には分からない。"}, {"fr": "Il est tellement mignon que je vais mourir.", "ja": "彼はかわいすぎて死にそうだ。"}], "points": ["名詞なら tellement de + 名詞。", "結果節は通常直説法。", "si + 形容詞 + que でも似た意味を表せる。"]}, {"lesson": "Leçon 11", "group": "理由・目的", "pattern": "Pour / afin de + 不定詞", "meaning": "～するために", "explanation": "主節と目的を表す不定詞の意味上の主語が同じときに使います。", "examples": [{"fr": "Je travaille tous les jours pour faire le tour du monde.", "ja": "私は世界一周をするために毎日働いている。"}, {"fr": "Je travaille tous les jours afin de faire le tour du monde.", "ja": "私は世界一周をするために毎日働いている。"}], "points": ["afin de は pour よりやや書き言葉的。", "主語が異なる場合は pour que / afin que + 接続法。", "否定目的：pour ne pas + 不定詞。"]}, {"lesson": "Leçon 11", "group": "理由・目的", "pattern": "Pour + avoir / être + 過去分詞", "meaning": "～したことで／～したため", "explanation": "不定詞複合形を使い、主節より前に完了した行為を理由・評価の根拠として表します。", "examples": [{"fr": "Il est connu pour avoir écrit plusieurs romans.", "ja": "彼は複数の小説を書いたことで知られている。"}, {"fr": "Elle a été félicitée pour être arrivée première.", "ja": "彼女は1位で到着したことで称賛された。"}], "points": ["avoir/être の不定詞 + 過去分詞。", "être を使う場合は、必要に応じて過去分詞を主語に一致させる。", "目的ではなく「理由・原因」の意味になることが多い。"]}, {"lesson": "Leçon 11", "group": "理由・目的", "pattern": "Pour que / afin que + 接続法", "meaning": "～するために／～するように", "explanation": "主節と目的節の主語が異なるときに使う目的構文です。", "examples": [{"fr": "Je travaille tous les jours pour que mon fils puisse faire le tour du monde.", "ja": "息子が世界一周できるように、私は毎日働いている。"}, {"fr": "Il parle lentement pour que tout le monde comprenne.", "ja": "みんなが理解できるように、彼はゆっくり話している。"}, {"fr": "Ils feront tout pour que cet homme ne soit pas élu président.", "ja": "この男が大統領に選ばれないように、彼らは何でもするだろう。"}], "points": ["pour que の後は接続法。", "同じ主語なら pour + 不定詞。", "comprendre → comprenne、être → soit。"]}, {"lesson": "Leçon 11", "group": "理由・目的", "pattern": "De sorte que / de manière que + 接続法", "meaning": "～するように", "explanation": "意図された目的を表すときは接続法を使います。", "examples": [{"fr": "Fermez la porte de manière qu’on ne nous entende pas.", "ja": "私たちの話が聞かれないように、ドアを閉めてください。"}, {"fr": "Collez la vignette de manière qu’elle soit visible.", "ja": "シールが見えるように、車両に貼ってください。"}], "points": ["目的なら接続法。", "entendre → entende、être → soit。", "pour que と近いが、de manière que は「そのような仕方で」のニュアンス。"]}, {"lesson": "Leçon 11", "group": "理由・目的", "pattern": "De sorte que + 直説法", "meaning": "その結果～／～なので", "explanation": "実際に起きた結果を述べるときは直説法を使います。", "examples": [{"fr": "Nous avons fermé la porte de sorte qu’on ne nous entend pas.", "ja": "私たちはドアを閉めたので、話は聞かれない。"}, {"fr": "Il a beaucoup travaillé, de sorte qu’il a réussi.", "ja": "彼は一生懸命勉強したので、その結果成功した。"}], "points": ["目的：接続法。実際の結果：直説法。", "同じ de sorte que でも意味で法が変わる。", "前後関係を見て判断する。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Espérer + 不定詞", "meaning": "～したいと望む", "explanation": "主語が同じ場合、espérer の後に不定詞を置いて希望を表します。", "examples": [{"fr": "Il espère finir son travail demain.", "ja": "彼は明日仕事を終えたいと思っている。"}, {"fr": "J’espère réussir l’examen.", "ja": "私は試験に合格したいと思っている。"}], "points": ["主語が同じ：espérer + 不定詞。", "主語が異なる：espérer que + 直説法が基本。", "souhaiter que は接続法なので混同しない。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Espérer + avoir / être + 過去分詞", "meaning": "～し終えていたいと望む", "explanation": "基準となる未来の時点までに行為が完了していることを望む表現です。", "examples": [{"fr": "Il espère avoir fini son travail demain.", "ja": "彼は明日までには仕事を終えてしまっていたいと思っている。"}, {"fr": "Elle espère être arrivée avant midi.", "ja": "彼女は正午前には到着していたいと思っている。"}], "points": ["不定詞複合形＝avoir/être の不定詞 + 過去分詞。", "主節の行為より前に完了することを示す。", "être を使う動詞では過去分詞の一致に注意。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Après + avoir / être + 過去分詞", "meaning": "～した後で", "explanation": "主節より前に完了した行為を、不定詞複合形で表します。", "examples": [{"fr": "Après avoir dîné, il est allé à la mer.", "ja": "夕食を終えた後、彼は海へ行った。"}, {"fr": "Après être sorti, il a pris le bus.", "ja": "外出した後、彼はバスに乗った。"}, {"fr": "Après s’être habillée, elle est sortie.", "ja": "着替えた後、彼女は外出した。"}], "points": ["主節と意味上の主語が同じ。", "être を使う場合は過去分詞を主語に一致させる。", "代名動詞：s’être + 過去分詞。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Depuis + 期間", "meaning": "～前からずっと", "explanation": "過去に始まり、現在まで続いている状態・行為を表します。", "examples": [{"fr": "Nous habitons à Rouen depuis dix ans.", "ja": "私たちは10年前からずっとルーアンに住んでいる。"}, {"fr": "J’étudie le français depuis trois ans.", "ja": "私は3年前からずっとフランス語を勉強している。"}], "points": ["今も続いているなら現在形を使う。", "英語の for / since に近いが、フランス語では現在形。", "終わった期間には pendant を使うことが多い。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Depuis que + 直説法", "meaning": "～してからずっと", "explanation": "過去のある出来事を起点として、その後も続く状態・行為を表します。", "examples": [{"fr": "Depuis que tu m’as quitté, je pleure.", "ja": "君が私のもとを離れてから、私はずっと泣いている。"}, {"fr": "Depuis que je travaille à l’hôpital, je dors beaucoup moins.", "ja": "病院で働き始めてから、私は寝る時間がかなり減っている。"}, {"fr": "Depuis que tu as commencé ce projet, tu sembles plus motivé.", "ja": "このプロジェクトを始めてから、君はよりやる気に満ちているように見える。"}], "points": ["depuis que の後は直説法。", "起点の出来事は複合過去、継続部分は現在形になることが多い。", "depuis + 名詞／期間 と区別する。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Dès que / aussitôt que + 直説法", "meaning": "～するとすぐに", "explanation": "ある出来事の直後に別の出来事が起こることを表します。", "examples": [{"fr": "Je t’enverrai un mail dès que je serai arrivé en France.", "ja": "フランスに着いたらすぐにメールを送るよ。"}, {"fr": "Il m’a dit bonjour aussitôt qu’il m’a vu.", "ja": "彼は私を見るとすぐに「こんにちは」と言った。"}], "points": ["どちらも直説法。", "未来の内容では、フランス語は dès que 以下にも未来時制を使える。", "英語の as soon as に近い。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Dès que + 前未来 / 複合過去", "meaning": "～し終えたらすぐに", "explanation": "先に完了する出来事を前未来または複合過去で表し、その直後の行為を続けます。", "examples": [{"fr": "Dès que nous aurons fini nos devoirs, nous sortirons au parc.", "ja": "宿題を終えたらすぐに、私たちは公園へ出かける。"}, {"fr": "Dès qu’on aura préparé les documents, on les enverra.", "ja": "書類を用意したらすぐに、それを送る。"}, {"fr": "Dès que tu auras fini de lire, rends-moi le livre.", "ja": "読み終わったらすぐに、その本を私に返して。"}], "points": ["未来の基準点より先に完了：前未来。", "主節は単純未来または命令形がよく使われる。", "前未来＝avoir/être の単純未来 + 過去分詞。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "À peine ... que", "meaning": "～するとすぐに／～したばかりで", "explanation": "一つの行為が終わるか終わらないかのうちに、次の行為が起きることを強調します。", "examples": [{"fr": "À peine est-il arrivé qu’il s’est mis à manger.", "ja": "彼は到着するとすぐに食べ始めた。"}, {"fr": "À peine avions-nous commencé qu’il a plu.", "ja": "私たちが始めた途端、雨が降った。"}], "points": ["文語では倒置がよく起こる：À peine est-il arrivé...", "se mettre à + 不定詞＝～し始める。", "dès que より「ほとんど間を置かず」の強調が強い。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Une fois que + 直説法", "meaning": "いったん～すると／～したら", "explanation": "ある行為が完了した後の状況を表します。", "examples": [{"fr": "Une fois qu’il est rentré à la maison, il est resté chez lui.", "ja": "いったん家に帰ると、彼はそのまま家にいた。"}, {"fr": "Une fois que nous sommes morts, nous n’avons plus mal.", "ja": "死んでしまえば、私たちはもう痛みを感じない。"}], "points": ["une fois que の後は直説法。", "完了を表す時制がよく使われる。", "que を省き、Une fois + 過去分詞 に縮められることがある。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Une fois + 過去分詞", "meaning": "いったん～したら／～されたら", "explanation": "Une fois que + 複合過去を簡潔にした形です。過去分詞は対応する名詞・主語に一致します。", "examples": [{"fr": "Une fois rentrée chez elle, elle ne sort plus.", "ja": "いったん家に帰ると、彼女はもう外出しない。"}, {"fr": "Une fois l’ordinateur installé, ils ont lancé le programme.", "ja": "コンピューターを設置するとすぐに、彼らはプログラムを起動した。"}], "points": ["rentrée は女性単数の elle に一致。", "名詞を明示する場合：Une fois l’ordinateur installé。", "意味上の主語が曖昧にならないようにする。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Il y a + 期間 + que + 直説法", "meaning": "～してから…になる／～して…年になる", "explanation": "過去に始まり現在まで続く期間を表します。depuis とほぼ同じ意味です。", "examples": [{"fr": "Il y a cinq ans que j’habite à Tokyo.", "ja": "私が東京に住んで5年になる。"}, {"fr": "Il y a dix ans que j’étudie le français.", "ja": "私がフランス語を勉強して10年になる。"}], "points": ["現在まで続いているので動詞は現在形。", "J’habite à Tokyo depuis cinq ans. と言い換え可能。", "Il y a cinq ans, j’ai habité... とは意味が異なる。"]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "Il y a + 期間 / dans + 期間", "meaning": "～前に／～後に", "explanation": "どちらも現在を起点にします。il y a は過去、dans は未来を表します。", "examples": [{"fr": "Le train est parti il y a cinq minutes.", "ja": "列車は5分前に出発した。"}, {"fr": "Le train partira dans cinq minutes.", "ja": "列車は5分後に出発する。"}], "points": ["il y a + 期間＝現在から見て過去。", "dans + 期間＝現在から見て未来。", "継続なら depuis：Elle habite au Canada depuis cinq ans."]}, {"lesson": "Leçon 12", "group": "不定詞複合形・時", "pattern": "期間 + plus tôt / avant ・ plus tard / après", "meaning": "その～前に／その～後に", "explanation": "現在以外の基準時点から見た前後関係を表します。", "examples": [{"fr": "Il a dit que le train était parti cinq minutes plus tôt.", "ja": "彼は、列車はその5分前に出発したと言った。"}, {"fr": "Il a dit que le train partirait cinq minutes plus tard.", "ja": "彼は、列車はその5分後に出発するだろうと言った。"}], "points": ["現在が起点なら il y a / dans。", "過去など別の時点が起点なら plus tôt / plus tard。", "間接話法では時制の一致と一緒に使われやすい。"]}, {"lesson": "Leçon 7", "group": "接続法①・関係節", "pattern": "目的・希望を表す主節 + 先行詞 + qui + 接続法", "meaning": "～してくれる…を探す・望む（存在が不確か）", "explanation": "まだ特定されていない人・物や、実際に存在するか分からない人・物を希望して探す場合、関係節の動詞に接続法を使います。すでに見つかっていて事実だと分かっている場合は直説法です。", "examples": [{"fr": "Je cherche quelqu’un qui vienne m’aider.", "ja": "私を助けに来てくれる人を探しています。"}, {"fr": "On a enfin trouvé un secrétaire qui sait parler plusieurs langues.", "ja": "私たちは、複数の言語を話せる秘書をやっと見つけた。"}], "points": ["未特定・存在が不確か・希望を含む場合：接続法。", "すでに見つかった人について事実を述べる場合：直説法。", "venir の接続法：que je vienne / que tu viennes / qu’il vienne / que nous venions / que vous veniez / qu’ils viennent。"]}, {"lesson": "Leçon 7", "group": "接続法①・関係節", "pattern": "否定・疑問の主節 + 先行詞 + qui + 接続法", "meaning": "～する人はいない／～する人はいますか", "explanation": "先行詞の存在を否定したり、その存在を疑問にしたりすると、該当する人・物が実在するか不確かになるため、関係節に接続法が使われます。", "examples": [{"fr": "Il n’y a personne qui puisse tout faire.", "ja": "全部できる人なんていない。"}, {"fr": "Y a-t-il quelqu’un qui ne comprenne pas ce que je viens de dire ?", "ja": "私が今言ったことを理解できない人はいますか。"}], "points": ["personne、rien、aucun などで存在を否定すると接続法になりやすい。", "疑問文でも、該当する人・物の存在が不確かなら接続法。", "comprendre は prendre と同じ活用に com- を付ける：je comprends / j’ai compris / que je comprenne。"]}, {"lesson": "Leçon 9", "group": "対立・譲歩構文①", "pattern": "A, mais B / pourtant / cependant + 直説法", "meaning": "AだがB／AなのにB", "explanation": "二つの事実を対立させる並立表現です。mais は接続詞、pourtant と cependant は副詞として使われ、後ろの内容は通常、事実を述べる直説法になります。", "examples": [{"fr": "Il pleut, mais nous sommes allés à la mer.", "ja": "雨が降っているが、私たちは海へ行った。"}, {"fr": "Cet homme est gentil, mais pas avec tout le monde.", "ja": "この男性は親切だが、すべての人に親切なわけではない。"}, {"fr": "Elle est riche, pourtant elle mène une vie modeste.", "ja": "彼女は裕福だが、質素な生活を送っている。"}, {"fr": "Il est malade, pourtant il est venu.", "ja": "彼は病気だが、それでも来た。"}, {"fr": "C’est invraisemblable, et cependant c’est vrai.", "ja": "それは嘘のようだが、しかし本当だ。"}, {"fr": "Cette robe est chère. Cependant, elle est très jolie.", "ja": "このドレスは高い。しかし、とてもきれいだ。"}], "points": ["mais は通常、二つの文要素を直接つなぐ。", "pourtant は「それにもかかわらず」という予想外の対立を強く表す。", "cependant は「しかしながら」に近く、やや書き言葉的。", "事実同士の対立なので、基本的に直説法を使う。"]}, {"lesson": "Leçon 9", "group": "対立・譲歩構文①", "pattern": "Bien que / quoique + 接続法", "meaning": "～だが／～であるにもかかわらず", "explanation": "ある事実を認めながら、それと反対・予想外の内容を主節で述べる譲歩構文です。bien que と quoique の後は接続法になります。", "examples": [{"fr": "Bien qu’il pleuve, nous sommes allés à la mer.", "ja": "雨が降っているにもかかわらず、私たちは海へ行った。"}, {"fr": "Bien qu’il soit blessé au pied, il peut marcher.", "ja": "彼は足をけがしているが、歩くことができる。"}, {"fr": "Bien qu’il ne comprenne pas bien le français, il essaie de lire.", "ja": "彼はフランス語があまりよく分からないが、読もうとしている。"}, {"fr": "Bien que mon train soit souvent en retard, je le prends tous les jours.", "ja": "私の乗る電車はよく遅れるが、私は毎日その電車に乗っている。"}, {"fr": "Bien qu’elle sache tout, elle ne dit rien.", "ja": "彼女はすべてを知っているのに、何も言わない。"}, {"fr": "Bien que cet homme ait bu cinq tasses de café, il en commande une autre.", "ja": "この男性はコーヒーを5杯飲んだのに、もう1杯注文している。"}, {"fr": "Bien qu’elle ne fasse pas de sport, elle est en bonne santé.", "ja": "彼女はスポーツをしないが、健康だ。"}, {"fr": "Bien qu’il soit malade, il travaille.", "ja": "彼は病気なのに、働いている。"}, {"fr": "Quoiqu’il obéisse à ses parents, ils sont méchants avec lui.", "ja": "彼は両親に従順なのに、両親は彼に対して意地悪だ。"}], "points": ["bien que / quoique の後は接続法。", "完了した過去の出来事には接続法過去：avoir / être の接続法 + 過去分詞。", "ait bu は boire の接続法過去、fasse は faire、sache は savoir の接続法。", "obéir は finir と同じ -ir 動詞の型：qu’il obéisse。", "授業資料には malgré que もありますが、標準的な文章では bien que または quoique を使う方が安全。"]}, {"lesson": "Leçon 9", "group": "対立・譲歩構文①", "pattern": "Alors que / tandis que + 直説法", "meaning": "～している間に／～なのに・一方で", "explanation": "二つの出来事が同時に進むこと、または二つの状況の対立を表します。実際の状況や出来事を述べるため、後ろは直説法です。", "examples": [{"fr": "Alors que je dormais, il y a eu un incendie.", "ja": "私が寝ている間に、火事があった。"}, {"fr": "Tandis qu’on jouait au tennis, il a commencé à pleuvoir.", "ja": "私たちがテニスをしている間に、雨が降り出した。"}, {"fr": "Tandis qu’il est là, elle est heureuse.", "ja": "彼がそこにいる間、彼女は幸せだ。"}, {"fr": "Charles m’a quittée, alors que je voulais être heureuse avec lui.", "ja": "シャルルは私のもとを去った。私は彼と幸せになりたかったのに。"}, {"fr": "Je travaillais seul, tandis que les autres jouaient aux cartes.", "ja": "私は一人で働いていたが、ほかの人たちはトランプをしていた。"}, {"fr": "Alors que je suis à Tokyo, je suis heureux.", "ja": "私は東京にいても幸せだ。"}], "points": ["①同時進行：「～している間に」。②対立：「～なのに／一方で」。", "事実を述べるため接続法ではなく直説法。", "過去の進行中の背景には半過去がよく使われる：dormais、jouait、travaillais。", "tandis que は二者の対比をはっきり示す場合にもよく使う。"]}, {"lesson": "Leçon 10", "group": "対立・譲歩構文②", "pattern": "Quel(le) que soit / Quel(le)s que soient + 名詞", "meaning": "～がどんなものであれ／どんな～であっても", "explanation": "人・物の性質や選択がどのようなものであっても、主節の内容は変わらないことを表す譲歩構文です。quel は後ろの名詞の性・数に一致し、être は接続法になります。", "examples": [{"fr": "Quelle que soit votre décision, nous la respecterons.", "ja": "あなたの決断がどのようなものであれ、私たちはそれを尊重します。"}, {"fr": "Quel que soit le choix du Président, nous le soutiendrons.", "ja": "大統領の選択がどのようなものであれ、私たちはそれを支持します。"}, {"fr": "Quels que soient vos projets, je vous aiderai.", "ja": "あなたの計画がどのようなものであれ、私はあなたを手伝います。"}], "points": ["quel と que は分けて書く：quel que / quelle que / quels que / quelles que。", "quel は後ろの名詞に一致する：quelle décision、quel choix、quels projets。", "être の接続法：soit / soient。"]}, {"lesson": "Leçon 10", "group": "対立・譲歩構文②", "pattern": "Quelque(s) + 名詞 + que + 接続法", "meaning": "どのような～を…しようとも／どんな～であっても", "explanation": "名詞の種類や内容が何であっても、主節の結論は変わらないことを表します。quelque は形容詞として後ろの名詞の数に一致し、que 以下は接続法になります。", "examples": [{"fr": "Quelques décisions que vous preniez, nous les respecterons.", "ja": "あなたがどのような決断をしようとも、私たちはそれらを尊重します。"}, {"fr": "Quelques livres qu’il ait lus, il ne sait pas tout.", "ja": "彼がどんな本を読んだとしても、すべてを知っているわけではない。"}, {"fr": "Quelque choix que fasse le Président, nous le soutiendrons.", "ja": "大統領がどのような選択をしようとも、私たちはそれを支持します。"}], "points": ["この形の quelque は名詞を修飾するため、複数なら quelques になる。", "que 以下は接続法：preniez、fasse、ait lus。", "接続法過去では、先行する直接目的語がある場合に過去分詞の一致にも注意する：livres qu’il ait lus。"]}, {"lesson": "Leçon 10", "group": "対立・譲歩構文②", "pattern": "Quelque + 形容詞 + que soi(en)t + 名詞", "meaning": "～がどんなに…でも", "explanation": "人・物の程度がどれほど高くても、主節の内容は変わらないことを表します。この quelque は副詞なので不変で、後ろの形容詞だけが名詞に一致します。", "examples": [{"fr": "Quelque difficiles que soient les règles, il faut les connaître.", "ja": "規則がどんなに難しくても、知っておかなければならない。"}, {"fr": "Quelque difficiles que soient ces livres, il faut les lire.", "ja": "これらの本がどんなに難しくても、読まなければならない。"}, {"fr": "Quelque bizarres que soient les choix du Président, nous les soutiendrons.", "ja": "大統領の選択がどんなにおかしなものであっても、私たちはそれらを支持します。"}], "points": ["この quelque は副詞なので常に quelque のまま。", "形容詞は名詞に一致する：difficiles、bizarres。", "語順は quelque + 形容詞 + que + être の接続法 + 名詞。"]}, {"lesson": "Leçon 10", "group": "対立・譲歩構文②", "pattern": "Si + 形容詞／副詞 + que + 接続法", "meaning": "どんなに～でも／いくら～しても", "explanation": "程度を認めながら、それでも主節の結果は変わらないことを表す譲歩構文です。que 以下には接続法を使います。", "examples": [{"fr": "Si bonne que soit la traduction, il faut lire le texte original.", "ja": "翻訳がどんなに良くても、原文を読むべきだ。"}, {"fr": "Si vite qu’il ait marché, il n’est pas fatigué.", "ja": "どんなに速く歩いたとしても、彼は疲れていない。"}, {"fr": "Si difficiles qu’aient été ces livres, je les aime.", "ja": "これらの本がどんなに難しかったとしても、私は好きだ。"}, {"fr": "Si fatigué que je sois ce soir, je veux accomplir mon travail.", "ja": "今夜どんなに疲れていても、私は自分の仕事をやり遂げたい。"}], "points": ["譲歩の si ... que の後は接続法。", "完了した行為・過去の状態には接続法過去：ait marché、aient été。", "結果を表す si ... que + 直説法と混同しない。"]}, {"lesson": "Leçon 10", "group": "対立・譲歩・結果", "pattern": "Si + 形容詞／副詞 + que + 直説法", "meaning": "あまりに～なので…／とても～なので…", "explanation": "形容詞や副詞の程度が原因となって、実際の結果が生じることを表す結果構文です。結果は事実として述べるため、que 以下は直説法になります。", "examples": [{"fr": "Il pleut si fort que les parapluies sont inutiles.", "ja": "雨があまりに強く降っているので、傘は役に立たない。"}, {"fr": "Il marche si vite qu’il est fatigué.", "ja": "彼はあまりに速く歩くので、疲れている。"}, {"fr": "Ces livres sont si bons que je les ai lus tout de suite.", "ja": "これらの本はとても良いので、私はすぐに読んでしまった。"}, {"fr": "Le ministre parle si bas que nous ne l’entendons pas.", "ja": "大臣はあまりに小さな声で話すので、私たちは彼の声が聞こえない。"}, {"fr": "Nous nous couchons si tôt que nous ne faisons rien la nuit.", "ja": "私たちはあまりに早く寝るので、夜は何もしない。"}, {"fr": "Le groupe a si bien joué que le public a été séduit.", "ja": "そのグループはあまりにすばらしく演奏したので、観客は魅了された。"}, {"fr": "La saison s’achève si doucement que nous préparons déjà la suivante.", "ja": "季節がとてもゆっくり終わっていくので、私たちはもう次の季節の準備をしている。"}], "points": ["結果構文では que 以下は直説法：est、ai lus、entendons、faisons。", "si + 形容詞／副詞 + que は『程度 → 実際の結果』を表す。", "譲歩の si + 形容詞／副詞 + que + 接続法とは、意味と法で区別する。"]}];
const lessons=["すべて", "Leçon 7", "Leçon 9", "Leçon 10", "Leçon 11", "Leçon 12"];
const stage=document.getElementById('stage'),lesson=document.getElementById('lesson'),pos=document.getElementById('pos'),knownN=document.getElementById('knownN'),againN=document.getElementById('againN'),bar=document.getElementById('bar');
let active='すべて',deck=[...allCards],index=0,flipped=false;
const KEY='fr-structure-flash-progress-v1';
const progress=JSON.parse(localStorage.getItem(KEY)||'{}');
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const id=c=>c.lesson+'::'+c.pattern;
function save(){localStorage.setItem(KEY,JSON.stringify(progress))}
function options(){lesson.innerHTML=lessons.map(x=>`<option>${esc(x)}</option>`).join('');lesson.value=active}
function stats(){const ids=new Set(deck.map(id));let k=0,a=0;for(const [x,v] of Object.entries(progress)){if(!ids.has(x))continue;if(v==='known')k++;if(v==='again')a++}pos.textContent=deck.length?`${index+1} / ${deck.length}`:'0 / 0';knownN.textContent=k;againN.textContent=a;bar.style.width=deck.length?`${(index+1)/deck.length*100}%`:'0%'}
function render(){stats();if(!deck.length){stage.innerHTML='<div class="empty">カードがありません</div>';return}const c=deck[index],state=progress[id(c)]||'';const ex=c.examples.map(x=>`<div class="ex"><p class="fr" lang="fr">${esc(x.fr)}</p><p class="ja">${esc(x.ja)}</p></div>`).join('');const pts=c.points.map(x=>`<li>${esc(x)}</li>`).join('');stage.innerHTML=`<div class="scene"><article id="card" class="flash ${flipped?'flip':''}" tabindex="0"><section class="face"><span class="badge">${esc(c.lesson)} · ${esc(c.group)}</span><div class="center"><h2 class="pattern" lang="fr">${esc(c.pattern)}</h2></div><p class="hint">タップして日本語訳と解説を見る</p></section><section class="face back"><span class="badge">${esc(c.lesson)} · ${esc(c.group)}</span><h2>構文の日本語訳</h2><p class="meaning">${esc(c.meaning)}</p><div class="explain">${esc(c.explanation)}</div><h2>例文と日本語訳</h2><div class="examples">${ex}</div><h2>ポイント</h2><ul class="pts">${pts}</ul></section></article></div><div class="actions"><button class="again" data-rate="again">${state==='again'?'✓ ':''}もう一回</button><button class="known" data-rate="known">${state==='known'?'✓ ':''}わかった</button></div>`;const card=document.getElementById('card');const flip=()=>{flipped=!flipped;card.classList.toggle('flip',flipped)};card.onclick=flip;card.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();flip()}};document.querySelectorAll('[data-rate]').forEach(b=>b.onclick=e=>{e.stopPropagation();progress[id(c)]=b.dataset.rate;save();next()})}
function rebuild(){deck=active==='すべて'?[...allCards]:allCards.filter(c=>c.lesson===active);index=0;flipped=false;render()}
function next(){if(!deck.length)return;index=(index+1)%deck.length;flipped=false;render()}
function prev(){if(!deck.length)return;index=(index-1+deck.length)%deck.length;flipped=false;render()}
lesson.onchange=e=>{active=e.target.value;rebuild()};document.getElementById('next').onclick=next;document.getElementById('prev').onclick=prev;document.getElementById('shuffle').onclick=()=>{for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]]}index=0;flipped=false;render()};
const root=document.documentElement,saved=localStorage.getItem('fr-flash-theme');if(saved)root.dataset.theme=saved;else if(matchMedia('(prefers-color-scheme:dark)').matches)root.dataset.theme='dark';document.getElementById('theme').onclick=()=>{const n=root.dataset.theme==='dark'?'light':'dark';root.dataset.theme=n;localStorage.setItem('fr-flash-theme',n)};
options();rebuild();
</script>
</body></html>
